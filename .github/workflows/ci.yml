name: CI & Deploy

on:
  push:
    branches:
      - dev
      - push_dockerhub  # added for manual Docker Hub push
  workflow_dispatch:  # manual trigger
jobs:
  build-and-deploy:
    runs-on: self-hosted
    steps:
      # 1. Checkout your repo (this pulls your latest commit to the runner workspace)
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub 
        uses: docker/login-action@v2
        with:
          username: netanelzucaim123
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Spotwise Frontend image
        run: |
          docker build  -t netanelzucaim123/spotwise-frontend-dockerhub:latest  .
          docker push netanelzucaim123/spotwise-frontend-dockerhub:latest

      - name: Deploy Spotwise Frontend with Docker Compose
        run: |
          docker compose up --build -d










