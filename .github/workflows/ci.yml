name: CI & Deploy

on:
  push:
    branches:
      - dev
      - push_dockerhub  # added for manual Docker Hub push
  workflow_dispatch:  # manual trigger
jobs:
  build-and-deploy:
    runs-on: self-hosted
    steps:
      - name: Check runner user
        run: whoami

      - name: Set commit ID variable
        id: vars
        run: echo "COMMIT_ID=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: netanelzucaim123
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Spotwise Frontend image
        run: |
          docker build -t netanelzucaim123/spotwise-frontend-dockerhub:${COMMIT_ID}  -t netanelzucaim123/spotwise-frontend-dockerhub:latest  .
          docker push netanelzucaim123/spotwise-frontend-dockerhub:${COMMIT_ID}
          docker push netanelzucaim123/spotwise-frontend-dockerhub:latest

      - name: Deploy Spotwise Frontend with Docker Compose
        run: |
          echo "Running on $(hostname)"
          cd /home/cs144/spotwise/SpotwiseFrontend && git pull
          cd /home/cs144/spotwise/SpotwiseBackend && git pull
          cp -f /home/cs144/spotwise/SpotwiseFrontend/Dockerfile /home/cs144/
          cd /home/cs144/spotwise
          docker compose up --build -d







